<!--8. Create a Photo Gallery with at least six images and apply hover effects such as zoom or overlay.-->

<html>
    <head>
        <title>photo gallery</title>
        <style>
            .gallery{
                display:flex;
            }
            img{
               width:500px;
               transition:0.3s;
            }
            img:hover{
                transform:scale(1.2);
            }
        </style>

    </head>
    <body>
        <div class="gallery">
        <img src="https://picsum.photos/200?1">
        <img src="https://picsum.photos/200?2">
        <img src="https://picsum.photos/200?3">
        <img src="https://picsum.photos/200?4">
        <img src="https://picsum.photos/200?5">
        <img src="https://picsum.photos/200?6">
        </body> 
    </body>
</html>
