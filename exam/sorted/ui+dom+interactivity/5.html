<!--5. Implement a Theme Switcher that allows users to toggle between Dark and Light modes, with preference stored using localStorage.-->

<html>
    <head><title>Toggle</title></head>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            padding:50px;
            transition:0.3s;
        }
        .toggle{
            width:50px;
            height:25px;
            background: #ccc;
            display:inline-block;
            border-radius: 20px;
            position:relative;
            cursor: pointer;
        }

        .toggle::after{
            content:"";
            width:20px;
            height:20px;
            background:white;
            position: absolute;
            top:2.5px;
            left:3px;
            transition:0.3s;
            border-radius: 50%;
        }

        input:checked+ .toggle{
            background: blue;
        }

        input:checked+ .toggle::after{
            left:26px;
        }
        .dark{
            background: black;
            color:white;
        }
    </style>

    <body>
        <h3>Toggle</h3>
        <label>
        <input type="checkbox" id="t" onchange="u()" hidden>
        <span class="toggle"></span>
        </label>

        <script>
            let b=document.body;
            let tgl=document.getElementById("t");

            if(localStorage.getItem("theme")=="dark")
        {
            b.className="dark";
            tgl.checked=true;
        }

        function u()
        {
            b.className=tgl.checked?"dark":"";
            localStorage.setItem("theme",b.className);
        }
        </script>
    </body>
</html>
