<!--3. Create a Pricing Toggle Interface that switches between Monthly and Yearly subscription plans and updates prices dynamically.-->

<html>
    <head>
        <title>
            Pricing toggle
        </title>
<style>
    body{
        font-family: Arial, Helvetica, sans-serif;
        text-align:center;
        padding:20px;
        background: whitesmoke;
    }
   .toggle{
    width:50px;
    height:25px;
    background: #ccc;
    border-radius: 20px;
    position: relative;
    display:inline-block;
    cursor: pointer;
   }
   .toggle::after{
    content:"";
    width:20px;
    height:20px;
    background: white;
    border-radius: 50%;
    position: absolute;
    top:2.5px;
    left:3px;
    transition:0.3s;
   }

   input:checked+ .toggle{
    background:#007bff;
   }

   input:checked+ .toggle::after{
    left:26px;
   }

   .plan{
    background:white;
    padding:10px;
    margin:10px auto;
    width:200px;
    border-radius: 8px;
   }

</style>
    </head>

    <body>
        <label>
            Monthly
            <input type="checkbox" id="t" onchange="u()" hidden>
            <span class="toggle"></span>
           Yearly
        </label>

        <div class="plan">
            Basic : Rs<span class="p" data-m="500" data-y="5000">500</span>
        </div>
        <div class="plan">
            Pro: Rs<span class="p" data-m="1000" data-y="15000">1000</span>
        </div>

        <script>
            function u()
            {
                let y=t.checked;
                document.querySelectorAll('.p').forEach(e=>
                    e.innerText=y?e.dataset.y:e.dataset.m
                );
            }
        </script>
    </body>
</html>
