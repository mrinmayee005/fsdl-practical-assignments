<!--28. Visualize Student Performance Data (marks, attendance, progress) using multiple chart types.-->

<!DOCTYPE html>
<html>
<head>
  <title>Student Performance</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h2 style="text-align:center;">Student Performance Dashboard</h2>

<canvas id="marksChart"></canvas>
<canvas id="attendanceChart"></canvas>
<canvas id="progressChart"></canvas>

<script>
let subjects = ["Math","Science","English","CS"];
let marks = [85, 90, 75, 95];

// MARKS (Bar Chart)
new Chart(document.getElementById("marksChart"), {
  type: "bar",
  data: {
    labels: subjects,
    datasets: [{
      label: "Marks",
      data: marks,
      backgroundColor: "blue"
    }]
  }
});

// ATTENDANCE (Pie Chart)
new Chart(document.getElementById("attendanceChart"), {
  type: "pie",
  data: {
    labels: ["Present","Absent","Leave"],
    datasets: [{
      data: [80, 10, 10],
      backgroundColor: ["green","red","orange"]
    }]
  }
});

// PROGRESS (Line Chart)
new Chart(document.getElementById("progressChart"), {
  type: "line",
  data: {
    labels: ["Sem1","Sem2","Sem3","Sem4"],
    datasets: [{
      label: "Progress",
      data: [70, 75, 85, 90],
      borderColor: "purple"
    }]
  }
});
</script>

</body>
</html>
