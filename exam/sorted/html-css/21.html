<!--21. Develop a Weekly Timetable using HTML tables with appropriate use of rowspan and colspan.-->


<!DOCTYPE html>
<html>
<head>
<style>
table{
  border-collapse:collapse;
  width:80%;
  margin:30px auto;
  text-align:center;
  font-family:Arial;
}

th,td{
  border:1px solid #333;
  padding:10px;
}
th{
  background:#eee;
}
</style>
</head>

<body>

<h3 style="text-align:center;">Weekly Timetable</h3>

<table>

<tr>
  <th>Time</th>
  <th>Mon</th>
  <th>Tue</th>
  <th>Wed</th>
  <th>Thu</th>
  <th>Fri</th>
</tr>

<tr>
  <td>9-10</td>
  <td rowspan="2">Math</td>
  <td>DS</td>
  <td>OS</td>
  <td>AI</td>
  <td>CN</td>
</tr>

<tr>
  <td>10-11</td>
  <td>Web</td>
  <td colspan="2">Lab</td>
  <td>DBMS</td>
</tr>

<tr>
  <td>11-12</td>
  <td>English</td>
  <td>Math</td>
  <td>DS</td>
  <td>OS</td>
  <td>AI</td>
</tr>

</table>

</body>
</html>
