            const containerRef = useRef(null);
            useEffect(() => {
                if (containerRef.current && window.lucide && window.lucide.icons[name]) {
                    // Create a fresh inner element to avoid React tracking issues
                    containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        icons: { [name]: window.lucide.icons[name] },
                        root: containerRef.current, // Constrain Lucide to only this container
                        nameAttr: 'data-lucide',
                        attrs: { 
                            class: className, 
                            width: size, 
                            height: size,
                            ...(color ? { color } : {}),
                            ...(fill ? { fill } : {})
                        }

                { id: '1', medName: 'Cheston cold', dosage: '1 Tablet', frequency: 1, times: ['11:13'], stockCount: 1, taken: false }
            ]);
            const [alertModal, setAlertModal] = useState(null);

            const t = translations[lang] || translations.en;

            // Audio Context & Speech
            const playSiren = () => {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(800, ctx.currentTime + 0.5);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 2);
                osc.stop(ctx.currentTime + 2);
            };

            const speak = (text) => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    window.speechSynthesis.speak(utterance);
                }
            };

            const triggerSOS = () => {
                playSiren();
                setAlertModal({ title: "SOS Sent", msg: `Emergency contact (${user.emergencyContact || 'Not Set'}) and location have been notified via SMS.`, type: "danger" });
            };

            const handleTakeMed = (medId) => {
                setMedicines(prev => prev.map(m => {
                    if (m.id === medId) {
                        const newStock = m.stockCount - 1;
                        if (newStock <= 2 && newStock > 0) {
                            setAlertModal({ title: "Running Low!", msg: `Only ${newStock} doses left. SMS sent to contact.`, type: "warning" });
                        } else if (newStock === 0) {
                            setAlertModal({ title: "Out of Stock!", msg: `Please restock immediately.`, type: "danger" });
                        }
                        return { ...m, stockCount: newStock, taken: true };
                    }
                    return m;
                }));
            };

            const deleteMed = (medId) => {
                setMedicines(prev => prev.filter(m => m.id !== medId));
            };

            // --- Sub-components (Screens) ---

            const ViewLogin = () => {
                const [step, setStep] = useState(1);
                const [phone, setPhone] = useState('');
                const [otp, setOtp] = useState('');
                const [emContact, setEmContact] = useState('');

                    if (!/^\d{10}$/.test(phone)) {
                        setAlertModal({ title: "Invalid Input", msg: "Please enter a valid 10-digit phone number.", type: "warning" });
                        return;
                    }
                    setStep(2);
                };

                const handleVerifyOtp = () => {
                    if (otp !== '12345') {
                        setAlertModal({ title: "Invalid OTP", msg: "Please enter the correct OTP (12345).", type: "danger" });
                        return;
                    }
                    setStep(3);
                };

                const completeLogin = () => {
                    if (!/^\d{10}$/.test(emContact)) {
                        setAlertModal({ title: "Invalid Input", msg: "Please enter a valid 10-digit emergency contact number.", type: "warning" });
                        return;
                    }
                    if (emContact === phone) {

                        phone: phone ? `+91${phone}` : prev.phone,

                const [img, setImg] = useState(null);

                const [isAnalyzing, setIsAnalyzing] = useState(false);
                
                const currentLanguage = langNames[lang] || "English";

                const analyzeImage = async (base64String, mimeType) => {
                    setIsAnalyzing(true);
                    setResult(null);

                    // Mock data logic based on the scan type
                    if (!apiKey || apiKey.trim() === "") {
                        setTimeout(() => {
                            let mockData;
                            if (scanType === 'prescription') {
                                mockData = {
                                    name: "Syp CALPOL (250/5)",
                                    usage: "Used to treat fever and mild pain.",
                                    how: "Give 4 mL every 6 hours for 3 days.",
                                    dosage: "4 mL"
                                };
                            } else if (scanType === 'report') {
                                mockData = {
                                    name: "No medication prescribed",
                                    usage: "There is no medication to take because the medical report states you are in good health and have no current medical concerns.",
                                    how: "You do not need to take any medicine at this time.",
                                    dosage: "None"
                                };
                            } else {
                                mockData = {
                                    name: "1-AL (Levocetirizine Tablets IP 5 mg)",
                                    usage: "Used to treat allergy symptoms like sneezing, runny nose, and itchy eyes.",
                                    how: "Swallow the tablet whole with a glass of water, with or without food.",
                                    dosage: "1 Tablet (5 mg)"
                                };
                            }
                            setResult(mockData);
                            setIsAnalyzing(false);
                            speak(`Analysis complete. ${mockData.name}.`);
                        }, 1500);
                        return;
                    }

                    try {
                        const base64Data = base64String.split(',')[1];
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{
                                    parts: [
                                        { text: `Analyze this image of a medicine, pill bottle, or prescription. Extract the medicine name, what it is used for, how to take it, and the standard dosage. Ensure the language is simple and suitable for an elderly patient. VERY IMPORTANT: Translate your descriptive answers (usage, how) into ${currentLanguage}.` },
                                        { inlineData: { mimeType: mimeType, data: base64Data } }
                                    ]
                                }],
                                generationConfig: {
                                    responseMimeType: "application/json",
                                    responseSchema: {
                                        type: "OBJECT",
                                        properties: {
                                            name: { type: "STRING", description: "Name of the medicine" },
                                            usage: { type: "STRING", description: "What the medicine is used for in simple terms" },
                                            how: { type: "STRING", description: "How to take the medicine (e.g., after meals, with water)" },
                                            dosage: { type: "STRING", description: "Standard dosage (e.g., 1 Tablet, 5ml)" }
                                        },
                                        required: ["name", "usage", "how", "dosage"]
                                    }
                                }
                            })
                        });

                        if (!response.ok) throw new Error(`API Error: ${response.status}`);
                        const data = await response.json();
                        const jsonText = data.candidates[0].content.parts[0].text;
                        const parsedData = JSON.parse(jsonText);
                        
                        setResult(parsedData);
                        speak(`Medicine identified. ${parsedData.name}.`);
                    } catch (error) {
                        console.error(error);
                        setAlertModal({ title: "Analysis Failed", msg: "Failed to analyze the image. Please try a clearer picture.", type: "danger" });
                    } finally {
                        setIsAnalyzing(false);
                    }
                };

                const handleFile = (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onloadend = () => {
                            setImg(reader.result);
                            analyzeImage(reader.result, file.type);
                        };
                        reader.readAsDataURL(file);
                    }
                };

                    <div className="flex-1 flex flex-col bg-background h-screen">

                            {!img ? (

                                    <div className="w-full h-64 border-2 border-dashed border-primary/50 bg-blue-50/50 rounded-[24px] flex flex-col items-center justify-center relative cursor-pointer">
                                        <Icon name="Camera" size={48} className="text-primary mb-4 opacity-50" />

                                        <input type="file" accept="image/*" capture="environment" onChange={handleFile} className="absolute inset-0 opacity-0 cursor-pointer" />
                                    </div>
                                </div>
                            ) : (
                                <div className="w-full">
                                    <img src={img} alt="Scanned" className="w-full h-64 object-cover object-center shadow-sm" />
                                    
                                    <div className="p-4 -mt-4 relative z-10">
                                        {isAnalyzing ? (
                                            <div className="bg-white rounded-[24px] p-8 text-center shadow-lg border border-gray-100 flex flex-col items-center">
                                                <Icon name="Loader2" size={40} className="animate-spin text-primary mb-3" />
                                                <p className="font-bold text-gray-700">{t.aiAnalyzing}</p>
                                            </div>
                                        ) : result ? (
                                            <div className="bg-white rounded-[24px] p-5 shadow-lg border-2 border-green-50">
                                                <div className="flex items-center gap-2 mb-5 text-success">
                                                    <Icon name="CheckCircle2" size={24} />
                                                    <h2 className="text-lg font-bold">Medicine Identified</h2>
                                                </div>

                                                <div className="space-y-3">
                                                    <div className="bg-blue-50/50 p-4 rounded-[16px] border border-blue-50">
                                                        <p className="text-[11px] uppercase font-bold text-gray-500 tracking-wider mb-1">MEDICINE NAME</p>
                                                        <p className="text-primary font-bold text-[19px] leading-tight">{result.name}</p>
                                                    </div>

                                                    <div className="bg-gray-50 p-4 rounded-[16px] border border-gray-100">
                                                        <p className="text-[11px] uppercase font-bold text-gray-500 tracking-wider mb-1">USED FOR</p>
                                                        <p className="text-gray-800 font-medium leading-snug text-[15px]">{result.usage}</p>
                                                    </div>

                                                    <div className="bg-gray-50 p-4 rounded-[16px] border border-gray-100">
                                                        <p className="text-[11px] uppercase font-bold text-gray-500 tracking-wider mb-1">HOW TO TAKE</p>
                                                        <p className="text-gray-800 font-medium leading-snug text-[15px]">{result.how}</p>
                                                    </div>
                                                    
                                                    <div className="flex gap-2">
                                                        <div className="flex-1 bg-gray-50 p-4 rounded-[16px] border border-gray-100">
                                                            <p className="text-[11px] uppercase font-bold text-gray-500 tracking-wider mb-1">STANDARD DOSAGE</p>
                                                            <p className="text-gray-800 font-bold">{result.dosage}</p>
                                                        </div>
                                                    </div>
                                                    
                                                    <button onClick={() => setView('addMed')} className="w-full bg-primary text-white py-4 rounded-[16px] font-bold mt-4 shadow-md flex justify-center items-center gap-2">
                                                        <Icon name="PlusCircle" size={20} /> Add to Reminders
                                                    </button>
                                                </div>
                                            </div>
                                        ) : null}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            // Main Render
            return (
                <div className="mobile-container">
                    {view === 'language' && <ViewLanguage />}
                    {view === 'login' && <ViewLogin />}
                    {view === 'home' && <ViewHome />}
                    {view === 'reminders' && <ViewReminders />}
                    {view === 'profile' && <ViewProfile />}
                    {view === 'addMed' && <ViewAddMed />}
                    {view === 'scan' && <ViewScanner />}

                    {['home', 'reminders', 'profile'].includes(view) && <BottomNav />}

                    {/* Global Alert Modal */}
                    {alertModal && (
                        <div className="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-6 backdrop-blur-sm">
                            <div className="bg-white rounded-3xl p-6 w-[340px] shadow-2xl animate-[fadeIn_0.2s_ease-out]">
                                <div className={`w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 ${
                                    alertModal.type === 'danger' ? 'bg-red-100 text-danger' :
                                    alertModal.type === 'warning' ? 'bg-orange-100 text-warning' :
                                    alertModal.type === 'success' ? 'bg-green-100 text-success' : 'bg-blue-100 text-primary'
                                }`}>
                                    <Icon name={
                                        alertModal.type === 'danger' ? 'AlertOctagon' :
                                        alertModal.type === 'warning' ? 'AlertTriangle' :
                                        alertModal.type === 'success' ? 'CheckCircle' : 'Info'
                                    } size={32} />
                                </div>
                                <h3 className="text-2xl font-bold text-center text-gray-800 mb-2">{alertModal.title}</h3>
                                <p className="text-center text-gray-600 mb-8 leading-relaxed font-medium">{alertModal.msg}</p>
                                <button 
                                    onClick={() => setAlertModal(null)}
                                    className="w-full bg-gray-900 text-white py-4 rounded-xl font-bold text-lg shadow-md active:bg-gray-800"
                                >
                                    Understood
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
