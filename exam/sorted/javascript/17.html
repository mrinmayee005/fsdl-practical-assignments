<html>
  <head>Product gallery</head>
  <body>

    <h3>Product Filter</h3>

    <select onchange="filter(this.value)">
      <option value="all">All</option>
      <option value="a">Category A</option>
      <option value="b">Category B</option>
    </select>

    <div class="container">
      <div class="item a">
        <img src="#">
        <p> Product 1 (A)</p>
      </div>
       <div class="item b">
        <img src="#">
        <p> Product 1 (B)</p>
      </div>
       <div class="item a">
        <img src="#">
        <p> Product 3 (A)</p>
      </div>
    </div>

    <script>
      function filter(c)
      {
        document.querySelectorAll(".item").forEach
        (i=>{
          i.style.display=(c=="all"|| i.classList.contains(c))?"block":"none";

        });
      }
    </script>
  </body>
</html>
