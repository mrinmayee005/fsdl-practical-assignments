<html>
    <body>
        <input id="t">
        <button onclick="add()">ADD</button>

        <ul id="l"></ul>

        <script>
            let n=JSON.parse(localStorage.getItem("n"))||[];
            function show()
            {
                l.innerHTML="";
                for(let i=0;i<n.length;i++)
            {
                l.innerHTML+="<li>"+n[i]+"<button onclick=del("+i+")>X</button></li>";
            }
            }

            function add()
            {
                if(!t.value) return;
                n.push(t.value);
                localStorage.setItem("n",JSON.stringify(n));
                t.value="";
                show();
            }

            function del(i)
            {
                n.splice(i,1);
                localStorage.setItem("n",JSON.stringify(n));
                show();
            }
            show();
        </script>
    </body>
</html>
