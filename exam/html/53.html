<html>
    <head> <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
    <body class="p-4">
        <h2>Skills</h2>
        <div class="mb-3">
            <label>HTML</label>
            <div class="progress">

            </div>

             <div class="mb-3">

            </div>
        </div>

         <div class="mb-3">
            <label>Javascript</label>
            <div class="progress">
                <div class="progress-bar  bg-destructive" style="width:50%">50%</div>
            </div>
    </body>
</html>
